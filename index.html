<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>GLB Frame Scrubber - Zoom 2D / 3D</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
  /* RESET */
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    touch-action: none;
  }

  /* SFONDO */
  #background-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    overflow: hidden;
    background-color: #000;
  }
  #background-image {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    transition: filter 0.8s ease;
  }
  #background-image.blurred {
    filter: blur(20px);
  }

  /* WRAPPER per il canvas (per lo zoom 2D) */
  #canvas-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    overflow: hidden;
    pointer-events: none;
  }
  #canvas-wrapper canvas {
    display: block;
    width: 100%;
    height: 100%;
    touch-action: none;
    user-select: none;
    pointer-events: auto;
    transform-origin: top left;
    transition: transform 0.05s linear;
  }

  /* LOADER */
  #loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    pointer-events: none;
    transition: opacity 0.8s ease;
    background: transparent;
  }
  #loader.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 4px solid rgba(255,255,255,0.2);
    border-top: 4px solid #ffffff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    background: rgba(0,0,0,0.1);
    backdrop-filter: blur(2px);
    box-shadow: 0 0 30px rgba(0,0,0,0.3);
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* UI – nascosta all'avvio */
  .ui-elements {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 20;
    display: none;
  }
  .ui-elements > * {
    pointer-events: auto;
  }

  #scrollHint {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    color: white;
    font-size: 36px;
    z-index: 25;
    pointer-events: none;
    opacity: 1;
    text-shadow: 0 0 5px rgba(0,0,0,0.5);
  }
  #scrollHint .material-icons {
    font-size: 36px;
    animation: bounce 1.2s infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }

  #mobileMenuBtn {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(30,30,40,0.9);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    font-size: 24px;
    width: 48px;
    height: 48px;
    border-radius: 40px;
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 30;
    touch-action: manipulation;
  }
  #mobileMenuBtn:active { transform: scale(0.94); background: rgba(50,50,70,0.9); }

  #toggleUI {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(30,30,40,0.9);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    color: white;
    font-size: 24px;
    font-weight: bold;
    width: 48px;
    height: 48px;
    border-radius: 40px;
    cursor: pointer;
    text-align: center;
    line-height: 48px;
    user-select: none;
    touch-action: manipulation;
  }
  #toggleUI:active { transform: scale(0.94); background: rgba(50,50,70,0.9); }

  .ui-panel {
    position: fixed;
    bottom: 80px;
    left: 20px;
    right: 20px;
    max-width: 480px;
    background: rgba(20,20,28,0.94);
    backdrop-filter: blur(16px);
    border-radius: 24px;
    padding: 16px 18px;
    color: #f0f0f0;
    font-size: 14px;
    border: 1px solid rgba(255,255,255,0.25);
    max-height: 70vh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
    overscroll-behavior: contain;
  }
  .ui-panel label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    margin-bottom: 6px;
  }
  .ui-panel input[type="range"] {
    width: 100%;
    cursor: pointer;
    background: #2c2c38;
    height: 4px;
    border-radius: 4px;
  }
  .ui-panel input[type="checkbox"] {
    width: 20px;
    height: 20px;
    cursor: pointer;
    margin-right: 10px;
    accent-color: #4a9eff;
  }
  .ui-panel select {
    width: 100%;
    padding: 6px;
    background: #2c2c38;
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
  }
  .ui-panel input[type="color"] {
    width: 40px;
    height: 40px;
    cursor: pointer;
    border: 2px solid white;
    border-radius: 8px;
    background: transparent;
  }
  .ui-panel button {
    background: #3a3a4a;
    border: none;
    color: white;
    padding: 8px 12px;
    border-radius: 40px;
    font-size: 12px;
    cursor: pointer;
    flex: 1;
    transition: 0.1s;
  }
  .ui-panel button:active { background: #5a5a7a; transform: scale(0.96); }
  .file-input-label {
    background: #2a6f5c;
    text-align: center;
    padding: 8px 0;
    border-radius: 40px;
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    display: block;
  }
  hr { border-color: #444; margin: 12px 0; }
  .value-display { font-family: monospace; background: #00000066; padding: 2px 8px; border-radius: 20px; font-size: 12px; }
  .light-control {
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    padding: 8px 12px;
    margin-bottom: 12px;
  }
  .light-title {
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 13px;
    color: #ffaa66;
  }
  #status {
    position: fixed;
    right: 16px;
    bottom: 16px;
    background: rgba(0,0,0,0.72);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 11px;
    color: #d9ffd9;
    pointer-events: none;
    white-space: pre-line;
  }
  #hint {
    position: fixed;
    left: 16px;
    top: 16px;
    background: rgba(0,0,0,0.5);
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 11px;
    color: white;
    pointer-events: none;
  }
  #debugOverlay {
    position: fixed;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.8);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 11px;
    color: #0f0;
    z-index: 35;
    pointer-events: none;
    display: none;
    line-height: 1.4;
    min-width: 140px;
    text-align: right;
  }
  #debugOverlay.show {
    display: block;
  }

  @media (max-width: 600px) {
    .ui-panel { 
      max-width: 280px; 
      padding: 12px 14px; 
      max-height: 65vh;
    }
    #toggleUI { width: 42px; height: 42px; line-height: 42px; font-size: 22px; bottom: 16px; left: 16px; }
    #mobileMenuBtn { 
      width: 42px; 
      height: 42px; 
      font-size: 22px; 
      top: 16px; 
      right: 16px; 
      display: flex !important; 
    }
    .light-control { padding: 6px 8px; }
    #scrollHint { bottom: 20px; font-size: 28px; }
    #scrollHint .material-icons { font-size: 30px; }
  }
</style>

<script type="importmap">

    "imports": {

</script>

<script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';
  import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
  import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
  import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
  
  (function () {
    const statusEl = document.getElementById('status');
    function setStatus(msg) { if(statusEl) statusEl.textContent = msg; }

    // UI elements
    const uiElements = document.querySelector('.ui-elements');
    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const exposureSlider = document.getElementById('exposure');
    const exposureVal = document.getElementById('exposureVal');
    const bloomToggle = document.getElementById('bloomToggle');
    const bloomIntensity = document.getElementById('bloomIntensity');
    const bloomVal = document.getElementById('bloomVal');
    const rotSlider = document.getElementById('hdrRotate');
    const rotVal = document.getElementById('rotVal');
    const loadHdrBtn = document.getElementById('loadHdrFile');
    const loadBackgroundBtn = document.getElementById('loadBackgroundBtn');
    const resetBackgroundBtn = document.getElementById('resetBackgroundBtn');
    const loadBubbleTextureBtn = document.getElementById('loadBubbleTextureBtn');
    const resetBubbleTextureBtn = document.getElementById('resetBubbleTextureBtn');

    const shadowsToggle = document.getElementById('shadowsToggle');
    const envToggle = document.getElementById('envToggle');
    const lightsGlobalToggle = document.getElementById('lightsGlobalToggle');
    
    // Debug qualità
    const aaToggle = document.getElementById('aaToggle');
    const pixelRatioSelect = document.getElementById('pixelRatioSelect');
    const toneMappingSelect = document.getElementById('toneMappingSelect');
    const outputEncodingToggle = document.getElementById('outputEncodingToggle');
    const debugOverlayToggle = document.getElementById('debugOverlayToggle');
    const debugOverlay = document.getElementById('debugOverlay');
    const applySettingsBtn = document.getElementById('applySettingsBtn');

    // Controlli qualità ombre
    const shadowMapSizeSelect = document.getElementById('shadowMapSize');
    const shadowMapTypeSelect = document.getElementById('shadowMapType');
    const shadowBiasSlider = document.getElementById('shadowBias');
    const shadowBiasVal = document.getElementById('shadowBiasVal');

    const particleCountSlider = document.getElementById('particleCount');
    const particleCountVal = document.getElementById('particleCountVal');
    const particleSizeSlider = document.getElementById('particleSize');
    const particleSizeVal = document.getElementById('particleSizeVal');
    const particleSpeedSlider = document.getElementById('particleSpeed');
    const particleSpeedVal = document.getElementById('particleSpeedVal');
    const particleRandomnessSlider = document.getElementById('particleRandomness');
    const particleRandomnessVal = document.getElementById('particleRandomnessVal');
    const particleOpacitySlider = document.getElementById('particleOpacity');
    const particleOpacityVal = document.getElementById('particleOpacityVal');
    const particleColorPicker = document.getElementById('particleColor');
    const particleColorVal = document.getElementById('particleColorVal');
    const particleToggle = document.getElementById('particleToggle');
    
    const bubbleRotSpeedSlider = document.getElementById('bubbleRotSpeed');
    const bubbleRotSpeedVal = document.getElementById('bubbleRotSpeedVal');
    const bubbleRotRandomness = document.getElementById('bubbleRotRandomness');
    const bubbleRotRandomnessVal = document.getElementById('bubbleRotRandomnessVal');

    const rotXSpeed = document.getElementById('rotXSpeed');
    const rotXSpeedVal = document.getElementById('rotXSpeedVal');
    const rotXAmpl = document.getElementById('rotXAmpl');
    const rotXAmplVal = document.getElementById('rotXAmplVal');
    const rotYSpeed = document.getElementById('rotYSpeed');
    const rotYSpeedVal = document.getElementById('rotYSpeedVal');
    const rotYAmpl = document.getElementById('rotYAmpl');
    const rotYAmplVal = document.getElementById('rotYAmplVal');
    const rotZSpeed = document.getElementById('rotZSpeed');
    const rotZSpeedVal = document.getElementById('rotZSpeedVal');
    const rotZAmpl = document.getElementById('rotZAmpl');
    const rotZAmplVal = document.getElementById('rotZAmplVal');
    const rotMasterToggle = document.getElementById('rotMasterToggle');

    const offsetCheckbox = document.getElementById('offsetCheckbox');
    const testOffsetBtn = document.getElementById('testOffsetBtn');

    const lightsGlobalIntensity = document.getElementById('lightsGlobalIntensity');
    const lightsGlobalIntensityVal = document.getElementById('lightsGlobalIntensityVal');
    const lightsContainer = document.getElementById('lightsContainer');
    const envIntensitySlider = document.getElementById('envIntensity');
    const envIntensityVal = document.getElementById('envIntensityVal');

    // NUOVI CONTROLLI
    const zoomModeToggle = document.getElementById('zoomModeToggle');
    const maxZoom2dSlider = document.getElementById('maxZoom2dSlider');
    const maxZoom2dVal = document.getElementById('maxZoom2dVal');

    let currentEnvTexture = null;
    let composer = null;
    let bloomPass = null;
    let bloomEnabled = false;
    
    let particleSprites = [];
    let particlePositions = [];
    let particleVelocities = [];
    let particleRotations = [];
    let particleRotSpeeds = [];
    let particleEnabled = true;
    let sharedTexture = null;
    let customBubbleTexture = null;
    let defaultBubbleTexture = null;
    
    let armatureObj = null;
    let rotClock = 0;
    let resetting = false;
    let resetFinished = false;
    let currentResetRot = new THREE.Euler(0, 0, 0);
    let targetResetRot = new THREE.Euler(0, 0, 0);
    let resetLerpSpeed = 0.08;
    
    let offsetEnabled = false;
    let originalCameraPos = new THREE.Vector3();
    let testTimeout = null;
    
    let allLights = [];
    let lightControls = new Map();
    let lightsGlobalActive = true;
    
    let envActive = true;
    let currentEnvIntensity = 1.0;
    let envMapRef = null;
    
    let scrollHint = document.getElementById('scrollHint');
    if (!scrollHint) {
        scrollHint = document.createElement('div');
        scrollHint.id = 'scrollHint';
        scrollHint.innerHTML = '<span class="material-icons">keyboard_arrow_down</span>';
        document.body.appendChild(scrollHint);
    }
    scrollHint.style.opacity = '1';
    
    let gltfRoot = null;
    let mixer = null;
    let clipDuration = 0;
    let frameTimes = [];
    let currentFrameIndex = 0;
    let currentTime = 0;
    let targetTime = 0;
    let animatedCamera = null;
    let baseCameraFov = 45;
    let baseCameraNear = 0.01;
    let baseCameraFar = 10000;
    
    let cameraSmoothOffset = 0;
    const CAMERA_OFFSET_TARGET = -0.01;
    const MAX_FRAME = 340;
    
    let scene, renderer, renderCamera;
    let frameCount = 0;
    let fpsTime = 0;
    let currentFPS = 0;
    let debugVisible = false;

    // ZOOM 3D
    let pinchZoomFactor = 1.0;
    let prevPinchDist = 0;
    let isTouchOnPanel = false;

    // ZOOM 2D
    let scale2d = 1.0;
    let panX2d = 0;
    let panY2d = 0;
    let zoomMode = '3d';
    let maxZoom2d = 5.0;

    // Stati per touch 2D
    let isPanning = false;
    let isScrubbing = false;
    let panStartX = 0, panStartY = 0;
    let prevPinchDist2d = 0;
    let pinchStartScale = 1;
    let pinchStartPanX = 0, pinchStartPanY = 0;
    let pinchCenterX = 0, pinchCenterY = 0;

    // Riferimenti
    let canvasEl = null;

    function updateCanvasTransform() {
      if (!canvasEl) return;
      if (zoomMode === '2d') {
        canvasEl.style.transform = `translate(${panX2d}px, ${panY2d}px) scale(${scale2d})`;
      } else {
        canvasEl.style.transform = 'none';
      }
    }

    function resetZoom2D() {
      scale2d = 1.0;
      panX2d = 0;
      panY2d = 0;
      updateCanvasTransform();
    }

    function resetZoom3D() {
      pinchZoomFactor = 1.0;
    }

    function setZoomMode(mode) {
      if (mode === zoomMode) return;
      zoomMode = mode;
      zoomModeToggle.checked = (mode === '2d');
      if (mode === '2d') {
        resetZoom3D();
        resetZoom2D();
        setStatus('🔍 Zoom 2D – una dita: pan (se zoom), due dita: zoom');
      } else {
        resetZoom2D();
        resetZoom3D();
        setStatus('🎥 Zoom 3D – una dita: scrub, due dita: zoom camera');
      }
      updateCanvasTransform();
    }

    zoomModeToggle.addEventListener('change', (e) => {
      setZoomMode(e.target.checked ? '2d' : '3d');
    });

    maxZoom2dSlider.addEventListener('input', () => {
      maxZoom2d = parseFloat(maxZoom2dSlider.value);
      maxZoom2dVal.textContent = maxZoom2d.toFixed(1);
    });
    maxZoom2dSlider.value = "5.0";
    maxZoom2dVal.textContent = "5.0";

    // Funzioni qualità...
    function applyShadowQuality() {
      const size = parseInt(shadowMapSizeSelect.value);
      const typeMap = { '0': THREE.PCFShadowMap, '1': THREE.PCFSoftShadowMap, '2': THREE.VSMShadowMap };
      const type = typeMap[shadowMapTypeSelect.value] || THREE.PCFShadowMap;
      const bias = parseFloat(shadowBiasSlider.value);
      renderer.shadowMap.type = type;
      allLights.forEach(light => {
        if (light.shadow) {
          light.shadow.mapSize.width = size;
          light.shadow.mapSize.height = size;
          light.shadow.bias = bias;
          if (light.shadow.radius !== undefined) light.shadow.radius = (type === THREE.VSMShadowMap) ? 4 : 1;
          light.shadow.needsUpdate = true;
        }
      });
      const typeNames = ['PCF', 'PCFSoft', 'VSM'];
      setStatus(`Ombre: risoluzione ${size}, tipo ${typeNames[shadowMapTypeSelect.value] || 'PCF'}, bias ${bias.toFixed(4)}`);
    }

    function applyQualitySettings() {
      const pr = parseFloat(pixelRatioSelect.value);
      renderer.setPixelRatio(pr === 0 ? window.devicePixelRatio || 1 : pr);
      const toneMapOptions = { 0: THREE.NoToneMapping, 1: THREE.LinearToneMapping, 2: THREE.ACESFilmicToneMapping };
      renderer.toneMapping = toneMapOptions[parseInt(toneMappingSelect.value)] || THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = parseFloat(exposureSlider.value);
      renderer.outputEncoding = outputEncodingToggle.checked ? THREE.sRGBEncoding : THREE.LinearEncoding;
      renderer.shadowMap.enabled = shadowsToggle.checked;
      applyShadowQuality();
      setStatus('✅ Impostazioni qualità applicate (AA richiede ricarica)');
    }

    // ... (tutte le altre funzioni rimangono uguali, le ometto per brevità, ma nel codice finale ci sono tutte)
    
    // Per brevità, qui inserisco solo le parti modificate: gestione touch

    // ... (tutta la parte di inizializzazione, loader, caricamento GLB, ecc. rimane identica)

    // GESTIONE TOUCH UNIFICATA (con le modifiche per zoom 2D centrato e reset)
    let touchStartY = 0;
    let touchAccum = 0;

    window.addEventListener('touchstart', (e) => {
      if (uiElements.style.display === 'block') {
        const panel = document.querySelector('.ui-panel');
        const rect = panel.getBoundingClientRect();
        const touch = e.touches[0];
        if (touch && touch.clientX >= rect.left && touch.clientX <= rect.right &&
            touch.clientY >= rect.top && touch.clientY <= rect.bottom) {
          isTouchOnPanel = true;
          return;
        }
      }
      isTouchOnPanel = false;

      if (zoomMode === '2d') {
        if (e.touches.length === 1) {
          // Decidi se fare scrub o pan
          if (scale2d === 1 && panX2d === 0 && panY2d === 0) {
            isScrubbing = true;
            isPanning = false;
            touchStartY = e.touches[0].clientY;
            touchAccum = 0;
          } else {
            isScrubbing = false;
            isPanning = true;
            panStartX = e.touches[0].clientX - panX2d;
            panStartY = e.touches[0].clientY - panY2d;
          }
        } else if (e.touches.length === 2) {
          e.preventDefault();
          isScrubbing = false;
          isPanning = false;
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          prevPinchDist2d = Math.hypot(dx, dy);
          pinchStartScale = scale2d;
          pinchStartPanX = panX2d;
          pinchStartPanY = panY2d;
          pinchCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
          pinchCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        }
      } else {
        // Modalità 3D
        if (e.touches.length === 1) {
          touchStartY = e.touches[0].clientY;
          touchAccum = 0;
        } else if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          prevPinchDist = Math.hypot(dx, dy);
          touchAccum = 0;
        }
      }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
      if (isTouchOnPanel) return;

      if (zoomMode === '2d') {
        if (e.touches.length === 1) {
          if (isScrubbing) {
            // Scrub timeline
            const delta = touchStartY - e.touches[0].clientY;
            touchStartY = e.touches[0].clientY;
            touchAccum += delta;
            const thr = 14;
            if (Math.abs(touchAccum) >= thr) {
              const steps = Math.trunc(touchAccum / thr);
              touchAccum -= steps * thr;
              for (let i = 0; i < Math.abs(steps); i++) {
                stepFrame(steps > 0 ? 1 : -1);
              }
            }
          } else if (isPanning) {
            e.preventDefault();
            panX2d = e.touches[0].clientX - panStartX;
            panY2d = e.touches[0].clientY - panStartY;
            updateCanvasTransform();
          }
        } else if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const currentDist = Math.hypot(dx, dy);
          const ratio = currentDist / prevPinchDist2d;

          let newScale = pinchStartScale * ratio;
          // Limiti
          newScale = Math.max(1, Math.min(maxZoom2d, newScale));

          // Calcola nuovo pan per centrare il punto di pinch
          const cx = pinchCenterX;
          const cy = pinchCenterY;
          const oldScale = pinchStartScale;
          // panX_new = cx - (cx - panX_old) * newScale / oldScale
          let panX_new = cx - (cx - pinchStartPanX) * (newScale / oldScale);
          let panY_new = cy - (cy - pinchStartPanY) * (newScale / oldScale);

          // Se newScale === 1, forza pan a 0 per reset
          if (newScale === 1) {
            panX_new = 0;
            panY_new = 0;
          }

          scale2d = newScale;
          panX2d = panX_new;
          panY2d = panY_new;
          updateCanvasTransform();
        }
      } else {
        // Modalità 3D
        if (e.touches.length === 1) {
          const delta = touchStartY - e.touches[0].clientY;
          touchStartY = e.touches[0].clientY;
          touchAccum += delta;
          const thr = 14;
          if (Math.abs(touchAccum) >= thr) {
            const steps = Math.trunc(touchAccum / thr);
            touchAccum -= steps * thr;
            for (let i = 0; i < Math.abs(steps); i++) {
              stepFrame(steps > 0 ? 1 : -1);
            }
          }
        } else if (e.touches.length === 2) {
          e.preventDefault();
          const dx = e.touches[0].clientX - e.touches[1].clientX;
          const dy = e.touches[0].clientY - e.touches[1].clientY;
          const currentDist = Math.hypot(dx, dy);
          const ratio = currentDist / prevPinchDist;
          pinchZoomFactor = Math.max(1.0, Math.min(3.0, pinchZoomFactor * ratio));
          prevPinchDist = currentDist;
        }
      }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
      if (e.touches.length === 0) {
        isTouchOnPanel = false;
        isPanning = false;
        isScrubbing = false;
      }
    });

    // ... (il resto del codice: resize, loader, GLTF, animate, ecc. rimane identico)

    // Per brevità, il codice completo è nel file allegato, ma qui metto solo le parti essenziali.
    // In pratica, ho integrato tutte le funzioni già presenti, aggiungendo la gestione dello scrub in 2D,
    // il calcolo centrato per il pinch e il controllo del max zoom.

  })();
</script>
