<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>GLB Frame Scrubber</title>

<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: Arial, Helvetica, sans-serif;
    touch-action: none;
  }

  canvas { display: block; }

  #hint {
    position: fixed;
    left: 16px;
    top: 16px;
    z-index: 20;
    color: #fff;
    background: rgba(0,0,0,0.5);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.45;
    pointer-events: none;
    max-width: min(460px, calc(100vw - 32px));
  }

  #status {
    position: fixed;
    right: 16px;
    bottom: 16px;
    z-index: 20;
    color: #d9ffd9;
    background: rgba(0,0,0,0.72);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 12px;
    line-height: 1.35;
    max-width: min(420px, calc(100vw - 32px));
    pointer-events: none;
    white-space: pre-line;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/RGBELoader.js"></script>
</head>

<body>
  <div id="hint">Scroll / swipe verticale: un frame per scatto.<br>Nessun mouse orbit, solo scrubbing della timeline.</div>
  <div id="status">Inizializzazione...</div>

  <script>
    (function () {
      const statusEl = document.getElementById('status');

      function setStatus(msg) {
        statusEl.textContent = msg;
      }

      function clamp(v, min, max) {
        return Math.max(min, Math.min(max, v));
      }

      function uniqueSorted(values) {
        const filtered = values.filter((v) => Number.isFinite(v));
        const uniq = Array.from(new Set(filtered.map((v) => +v.toFixed(6))));
        uniq.sort((a, b) => a - b);
        return uniq;
      }

      function collectFrameTimesFromClip(clip) {
        const times = [];

        clip.tracks.forEach((track) => {
          if (track && track.times && track.times.length) {
            for (let i = 0; i < track.times.length; i++) {
              times.push(track.times[i]);
            }
          }
        });

        let uniq = uniqueSorted(times);

        if (uniq.length >= 2) {
          return uniq;
        }

        // fallback 30fps se il clip non espone keyframe utili
        const fps = 30;
        const step = 1 / fps;
        const generated = [];
        for (let t = 0; t <= clip.duration + 1e-6; t += step) {
          generated.push(+t.toFixed(6));
        }
        if (generated[generated.length - 1] !== +clip.duration.toFixed(6)) {
          generated.push(+clip.duration.toFixed(6));
        }
        return uniqueSorted(generated);
      }

      const scene = new THREE.Scene();

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false
      });
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.outputEncoding = THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.0;
      document.body.appendChild(renderer.domElement);

      // Camera che renderizziamo davvero: viene inizializzata dalla camera del GLB se esiste.
      const renderCamera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.01,
        10000
      );
      renderCamera.position.set(0, 0, 5);

      scene.add(new THREE.AmbientLight(0xffffff, 1.2));
      const dir = new THREE.DirectionalLight(0xffffff, 1.0);
      dir.position.set(5, 10, 7);
      scene.add(dir);

      const pmremGenerator = new THREE.PMREMGenerator(renderer);
      pmremGenerator.compileEquirectangularShader();

      function loadEnvironment() {
        const jpgLoader = new THREE.TextureLoader();
        jpgLoader.load(
          './environment.jpg',
          function (texture) {
            texture.mapping = THREE.EquirectangularReflectionMapping;
            const envMap = pmremGenerator.fromEquirectangular(texture).texture;
            scene.environment = envMap;
            scene.background = texture;
            setStatus('Environment JPG caricato');
          },
          undefined,
          function () {
            const hdrLoader = new THREE.RGBELoader();
            hdrLoader.load(
              './environment.hdr',
              function (hdrTexture) {
                hdrTexture.mapping = THREE.EquirectangularReflectionMapping;
                const envMap = pmremGenerator.fromEquirectangular(hdrTexture).texture;
                scene.environment = envMap;
                scene.background = hdrTexture;
                setStatus('Environment HDR caricato');
              },
              undefined,
              function () {
                scene.background = new THREE.Color(0x000000);
                setStatus('Nessun environment trovato');
              }
            );
          }
        );
      }

      loadEnvironment();

      const loader = new THREE.GLTFLoader();

      let gltfRoot = null;
      let mixer = null;
      let clipDuration = 0;
      let frameTimes = [];
      let currentFrameIndex = 0;
      let currentTime = 0;
      let targetTime = 0;
      let animatedCamera = null;

      let baseCameraFov = renderCamera.fov;
      let baseCameraNear = renderCamera.near;
      let baseCameraFar = renderCamera.far;

      function findCamera(root) {
        let found = null;
        root.traverse((obj) => {
          if (found) return;
          const name = (obj.name || '').toLowerCase();
          if (obj.isCamera || obj.type === 'PerspectiveCamera' || obj.type === 'OrthographicCamera' || name.includes('camera')) {
            found = obj;
          }
        });
        return found;
      }

      function updateRenderCameraFromGLB() {
        if (!animatedCamera) return;

        animatedCamera.updateMatrixWorld(true);

        const pos = new THREE.Vector3();
        const quat = new THREE.Quaternion();

        animatedCamera.getWorldPosition(pos);
        animatedCamera.getWorldQuaternion(quat);

        renderCamera.position.copy(pos);
        renderCamera.quaternion.copy(quat);
        renderCamera.fov = animatedCamera.fov || baseCameraFov;
        renderCamera.near = animatedCamera.near || baseCameraNear;
        renderCamera.far = animatedCamera.far || baseCameraFar;
        renderCamera.zoom = animatedCamera.zoom || 1;
        renderCamera.aspect = window.innerWidth / window.innerHeight;
        renderCamera.updateProjectionMatrix();

        baseCameraFov = renderCamera.fov;
        baseCameraNear = renderCamera.near;
        baseCameraFar = renderCamera.far;
      }

      function applyTime(time) {
        if (!mixer) return;

        // Forza il mixer sul tempo scelto dallo scroll.
        currentTime = clamp(time, 0, clipDuration || time);
        mixer.setTime(currentTime);

        // alcune scene/rig richiedono un secondo update per propagare correttamente le matrici
        mixer.update(0);
        if (gltfRoot) gltfRoot.updateMatrixWorld(true);

        if (animatedCamera) {
          updateRenderCameraFromGLB();
        }
      }

      function setFrameIndex(nextIndex) {
        if (!frameTimes.length) return;
        currentFrameIndex = clamp(nextIndex, 0, frameTimes.length - 1);
        targetTime = frameTimes[currentFrameIndex];
        applyTime(targetTime);
        setStatus(
          'Frame ' + (currentFrameIndex + 1) + ' / ' + frameTimes.length +
          '\nTime: ' + currentTime.toFixed(4) + 's'
        );
      }

      function stepFrame(direction) {
        if (!mixer || !frameTimes.length) return;
        setFrameIndex(currentFrameIndex + direction);
      }

      loader.load(
        './invito.glb',
        function (gltf) {
          if (gltfRoot) scene.remove(gltfRoot);

          gltfRoot = gltf.scene;
          scene.add(gltfRoot);

          gltfRoot.traverse((obj) => {
            if (obj.isMesh) {
              obj.frustumCulled = false;
              obj.castShadow = true;
              obj.receiveShadow = true;
              if (obj.material) obj.material.needsUpdate = true;
            }
          });

          animatedCamera = findCamera(gltfRoot);

          if (animatedCamera) {
            updateRenderCameraFromGLB();
          }

          if (gltf.animations && gltf.animations.length) {
            mixer = new THREE.AnimationMixer(gltfRoot);

            // Usa tutte le clip, senza pausa, così mixer.setTime() le forza correttamente.
            gltf.animations.forEach((clip) => {
              const action = mixer.clipAction(clip);
              action.enabled = true;
              action.paused = false;
              action.clampWhenFinished = true;
              action.loop = THREE.LoopOnce;
              action.play();
            });

            // scegli la clip più lunga come riferimento per i frame
            const refClip = gltf.animations.reduce(
              (a, b) => (b.duration > a.duration ? b : a),
              gltf.animations[0]
            );

            clipDuration = refClip.duration;
            frameTimes = collectFrameTimesFromClip(refClip);

            currentFrameIndex = 0;
            currentTime = frameTimes[0] || 0;
            targetTime = currentTime;

            applyTime(currentTime);

            setStatus(
              (animatedCamera ? 'Camera trovata\n' : 'Camera non trovata\n') +
              'Clip: ' + gltf.animations.length + '\n' +
              'Frame disponibili: ' + frameTimes.length + '\n' +
              'Time: ' + currentTime.toFixed(4) + 's'
            );
          } else {
            mixer = null;
            clipDuration = 0;
            frameTimes = [];
            currentFrameIndex = 0;
            currentTime = 0;
            targetTime = 0;
            setStatus(
              (animatedCamera ? 'Camera trovata\n' : 'Camera non trovata\n') +
              'Nessuna animazione nel GLB'
            );
          }
        },
        function (xhr) {
          if (xhr.total) {
            const pct = Math.round((xhr.loaded / xhr.total) * 100);
            setStatus('Caricamento GLB: ' + pct + '%');
          }
        },
        function (err) {
          console.error(err);
          setStatus('Errore caricamento GLB');
        }
      );

      // Scroll: un evento = un frame
      window.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (!mixer || !frameTimes.length) return;
        const dir = e.deltaY > 0 ? 1 : -1;
        stepFrame(dir);
      }, { passive: false });

      // Touch: quando superi una piccola soglia, passi al frame dopo/prima
      let lastTouchY = 0;
      let touchAccumulator = 0;

      window.addEventListener('touchstart', (e) => {
        if (!e.touches.length) return;
        lastTouchY = e.touches[0].clientY;
        touchAccumulator = 0;
      }, { passive: false });

      window.addEventListener('touchmove', (e) => {
        if (!e.touches.length) return;
        e.preventDefault();

        const y = e.touches[0].clientY;
        const delta = lastTouchY - y;
        lastTouchY = y;
        touchAccumulator += delta;

        const threshold = 14;
        if (Math.abs(touchAccumulator) >= threshold) {
          const steps = Math.trunc(touchAccumulator / threshold);
          touchAccumulator -= steps * threshold;

          if (steps > 0) {
            for (let i = 0; i < steps; i++) stepFrame(1);
          } else if (steps < 0) {
            for (let i = 0; i < Math.abs(steps); i++) stepFrame(-1);
          }
        }
      }, { passive: false });

      window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderCamera.aspect = window.innerWidth / window.innerHeight;
        renderCamera.updateProjectionMatrix();
      });

      function animate() {
        requestAnimationFrame(animate);

        if (mixer && frameTimes.length) {
          // tieni la scena esattamente sul frame scelto
          if (currentTime !== targetTime) {
            applyTime(targetTime);
          } else if (animatedCamera) {
            updateRenderCameraFromGLB();
          }
        }

        renderer.render(scene, renderCamera);
      }

      animate();
    })();
  </script>
</body>
</html>
